<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ego Yazılım | Satış Paneli</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --pink: #ff2a6d; --bg: #030710; }
        body { background-color: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .main-card { background: rgba(26, 26, 26, 0.9); padding: 25px; border-radius: 20px; width: 100%; max-width: 450px; border: 2px solid var(--pink); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: var(--pink); text-align: center; margin: 0; font-size: 1.6rem; }
        .ceo-title { text-align: center; font-size: 0.75rem; margin-bottom: 20px; color: #aaa; text-transform: uppercase; }
        
        .kumbara-box { background: #000; padding: 15px; border-radius: 12px; border: 1px solid #333; text-align: center; margin-bottom: 20px; }
        .para-text { font-size: 2rem; color: #00ff9d; font-weight: bold; }
        
        .row { display: flex; align-items: center; margin-bottom: 8px; padding: 10px; background: #1a1a1a; border-radius: 8px; font-size: 0.9rem; }
        button { background: var(--pink); border: none; padding: 6px 12px; color: white; border-radius: 5px; cursor: pointer; font-weight: bold; margin-left: auto; transition: 0.2s; }
        button:hover { filter: brightness(1.2); }
        
        .sepet-alan { margin: 20px 0; padding: 15px; background: #111; border-radius: 10px; border: 1px dashed var(--pink); }
        .odeme-btn { width: 100%; padding: 15px; background: linear-gradient(90deg, #ff2a6d, #8a00ff); border: none; color: white; font-weight: bold; border-radius: 10px; cursor: pointer; font-size: 1rem; margin-top: 10px; }
    </style>
</head>
<body>

<div class="main-card">
    <h1>EGO YAZILIM</h1>
    <div class="ceo-title">KURUCU & CEO: EGEMEN ÖZEL</div>
    
    <div class="kumbara-box">
        <div style="font-size: 0.7rem; color: #666;">BİRİKEN SERMAYE</div>
        <div class="para-text"><span id="toplam">0</span> TL</div>
    </div>

    <h2>Ürünler</h2>
    <div class="row"><span>Özel Tasarım Kupa (275 TL)</span><button onclick="ekle('Kupa', 275)">Ekle</button></div>
    <div class="row"><span>Video Edit (150 TL)</span><button onclick="ekle('Video Edit', 150)">Ekle</button></div>
    <div class="row"><span>Logo Tasarım (200 TL)</span><button onclick="ekle('Logo Tasarım', 200)">Ekle</button></div>

    <div class="sepet-alan">
        <div style="font-weight: bold; font-size: 0.8rem; color: var(--pink);">SEPET LİSTESİ:</div>
        <div id="liste" style="font-size: 0.85rem; margin-top: 5px;">Sepet boş.</div>
    </div>

    <button class="odeme-btn" onclick="odemeYap()">KREDİ KARTI İLE ÖDE</button>
</div>

<script>
    let sepet = [];
    let toplam = 0;
    // SHOPIER LİNKİNİ BURAYA YAPIŞTIR
    const magazaLinkim = "https://www.shopier.com/MAGAZA_ADIN"; 

    function ekle(urun, fiyat) {
        sepet.push(urun);
        toplam += fiyat;
        document.getElementById('toplam').innerText = toplam;
        document.getElementById('liste').innerText = sepet.join(" + ");
    }

    function odemeYap() {
        if(toplam <= 0) {
            alert("Kumbara boş! Önce ürün ekle CEO.");
        } else {
            window.open(magazaLinkim, '_blank');
        }
    }
</script>
</body>
</html>
